# 시뮬레이션 판정 기준
# 각 검증 항목별 pass/warning/fail 임계값

geometry:
  volume_tolerance:
    pass: 0.01      # 1% 이내
    warning: 0.03   # 3% 이내
    fail: 0.03      # 3% 초과
  surface_area_tolerance:
    pass: 0.01
    warning: 0.03
    fail: 0.03
  bounding_box_tolerance:
    pass: 0.005
    warning: 0.01
    fail: 0.01

mesh:
  aspect_ratio:
    pass: 3.0
    warning: 5.0
    fail: 10.0
  skewness:
    pass: 0.5
    warning: 0.75
    fail: 0.95
  min_jacobian:
    pass: 0.3
    warning: 0.1
    fail: 0.0

structural:
  safety_factor:
    default: 2.0
    min_pass: 1.5
    warning: 1.2
    fail: 1.0
  max_displacement_ratio:  # 최대 변위 / 특성 길이
    pass: 0.001
    warning: 0.005
    fail: 0.01
  convergence:
    max_residual: 1.0e-6
    max_iterations: 1000

thermal:
  max_temperature:
    # 절대값은 작업별로 지정, 여기는 기본값
    default_limit_celsius: 85.0
  convergence:
    max_residual: 1.0e-4
    max_iterations: 500

# 열 해석 파이프라인 검증 게이트
thermal_analysis:
  max_temperature_c:
    operator: "<="
    threshold: 100.0
    warning_threshold: 85.0
  thermal_resistance_c_per_w:
    operator: "<="
    threshold: 5.0
    warning_threshold: 3.0
  convergence:
    expected: true

cfd:
  convergence:
    continuity_residual: 1.0e-4
    velocity_residual: 1.0e-4
    max_iterations: 5000
  y_plus:
    wall_resolved:
      pass: 1.0
      warning: 5.0
    wall_function:
      pass: 30.0
      warning_low: 10.0
      warning_high: 300.0

electromagnetic:
  s_parameter:
    return_loss_db: -10.0  # S11 < -10dB
  impedance:
    tolerance_percent: 5.0  # 목표 임피던스 대비

# 반복 최적화 설정
optimization:
  max_iterations: 8
  strategies:
    thermal:
      temperature_over:
        - action: increase_area
          factor: 1.2
          description: "방열 면적 20% 증가"
        - action: increase_thickness
          factor: 1.3
          description: "두께 30% 증가"
        - action: suggest_material
          description: "고열전도 재질로 변경 제안"
        - action: suggest_forced_convection
          description: "강제대류 냉각 제안"
    structural:
      safety_factor_low:
        - action: increase_thickness
          factor: 1.1
          description: "두께 10% 증가"
        - action: increase_thickness
          factor: 1.15
          description: "두께 15% 증가"
        - action: suggest_material
          description: "고강도 재질로 변경 제안"
      displacement_over:
        - action: increase_thickness
          factor: 1.15
          description: "두께 15% 증가"
        - action: suggest_material
          description: "고강성 재질로 변경 제안"
  physical_limits:
    max_area_factor: 10.0
    max_thickness_factor: 5.0

pcb:
  drc:
    clearance_violations: 0    # 0이어야 pass
    width_violations: 0
    drill_violations: 0
  impedance:
    tolerance_percent: 10.0
